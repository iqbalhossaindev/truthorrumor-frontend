<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Truth or Rumor Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #121a2b;
      --panel-2: #182235;
      --border: #27324a;
      --text: #e8eefc;
      --muted: #9fb0d0;
      --primary: #4f8cff;
      --primary-hover: #3f79e0;
      --danger: #ef4444;
      --danger-hover: #dc2626;
      --success: #16a34a;
      --warning: #f59e0b;
      --input: #0f172a;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #09101d 0%, #0f172a 100%);
      color: var(--text);
    }

    .container {
      width: min(1100px, calc(100% - 32px));
      margin: 32px auto;
    }

    .card {
      background: rgba(18, 26, 43, 0.95);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 20px 24px;
      margin-bottom: 20px;
    }

    .brand h1 {
      margin: 0;
      font-size: 28px;
    }

    .brand p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .hidden {
      display: none !important;
    }

    .login-wrap {
      min-height: calc(100vh - 64px);
      display: grid;
      place-items: center;
    }

    .login-card {
      width: min(460px, calc(100% - 32px));
      padding: 24px;
    }

    .login-card h2 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .login-card p {
      margin: 0 0 20px;
      color: var(--muted);
    }

    .form-group {
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: var(--text);
      font-weight: 600;
    }

    input,
    textarea,
    select {
      width: 100%;
      background: var(--input);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 15px;
      outline: none;
    }

    textarea {
      min-height: 140px;
      resize: vertical;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79, 140, 255, 0.15);
    }

    .btn {
      border: 0;
      border-radius: 12px;
      padding: 12px 16px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      transition: 0.2s ease;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
    }

    .btn-secondary {
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: #202d46;
    }

    .btn-danger {
      background: var(--danger);
      color: white;
    }

    .btn-danger:hover {
      background: var(--danger-hover);
    }

    .btn-success {
      background: var(--success);
      color: white;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .dashboard {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 20px;
    }

    @media (max-width: 920px) {
      .dashboard {
        grid-template-columns: 1fr;
      }
    }

    .panel {
      padding: 20px;
    }

    .panel h3 {
      margin: 0 0 16px;
      font-size: 22px;
    }

    .help-text {
      color: var(--muted);
      font-size: 13px;
      margin-top: 6px;
    }

    .status-box {
      margin: 14px 0 0;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 14px;
      display: none;
    }

    .status-box.show {
      display: block;
    }

    .status-success {
      background: rgba(22, 163, 74, 0.15);
      border: 1px solid rgba(22, 163, 74, 0.35);
      color: #b9f6ca;
    }

    .status-error {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.35);
      color: #fecaca;
    }

    .status-info {
      background: rgba(79, 140, 255, 0.15);
      border: 1px solid rgba(79, 140, 255, 0.35);
      color: #dbeafe;
    }

    .posts-list {
      display: grid;
      gap: 14px;
    }

    .post-card {
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(24, 34, 53, 0.7);
    }

    .post-card h4 {
      margin: 0 0 8px;
      font-size: 18px;
      line-height: 1.4;
    }

    .meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid transparent;
    }

    .badge-truth {
      background: rgba(22, 163, 74, 0.15);
      color: #bbf7d0;
      border-color: rgba(22, 163, 74, 0.35);
    }

    .badge-rumor {
      background: rgba(239, 68, 68, 0.15);
      color: #fecaca;
      border-color: rgba(239, 68, 68, 0.35);
    }

    .badge-category {
      background: rgba(79, 140, 255, 0.15);
      color: #dbeafe;
      border-color: rgba(79, 140, 255, 0.35);
    }

    .post-excerpt {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 14px;
      line-height: 1.6;
    }

    .post-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .preview-img {
      width: 100%;
      max-height: 220px;
      object-fit: cover;
      border-radius: 12px;
      border: 1px solid var(--border);
      margin-top: 10px;
    }

    .small {
      font-size: 12px;
      color: var(--muted);
    }

    .empty {
      color: var(--muted);
      padding: 8px 2px;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .toolbar input {
      flex: 1;
      min-width: 180px;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 4px;
    }

    .checkbox-row input[type="checkbox"] {
      width: auto;
      transform: scale(1.15);
    }
  </style>
</head>
<body>
  <div id="loginView" class="login-wrap">
    <div class="card login-card">
      <h2>Admin Login</h2>
      <p>Login with your Supabase admin email and password.</p>

      <div class="form-group">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" placeholder="admin@example.com" />
      </div>

      <div class="form-group">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" placeholder="Enter password" />
      </div>

      <button class="btn btn-primary" id="loginBtn">Login</button>

      <div id="loginStatus" class="status-box"></div>
    </div>
  </div>

  <div id="adminView" class="container hidden">
    <div class="card header">
      <div class="brand">
        <h1>Truth or Rumor Admin</h1>
        <p>Manage posts, upload images, edit content, and delete posts.</p>
      </div>
      <div class="top-actions">
        <button class="btn btn-secondary" id="refreshBtn">Refresh Posts</button>
        <button class="btn btn-danger" id="logoutBtn">Logout</button>
      </div>
    </div>

    <div class="dashboard">
      <div class="card panel">
        <h3 id="formTitle">Create Post</h3>

        <div class="form-group">
          <label for="title">Title</label>
          <input type="text" id="title" placeholder="Write the post title" />
        </div>

        <div class="form-group">
          <label for="slug">Slug</label>
          <input type="text" id="slug" placeholder="example-post-title" />
          <div class="help-text">Leave it empty and it will be generated from title.</div>
        </div>

        <div class="form-group">
          <label for="category">Category</label>
          <input type="text" id="category" placeholder="Politics, Tech, World, Sports..." />
        </div>

        <div class="form-group">
          <label for="verdict">Verdict</label>
          <select id="verdict">
            <option value="truth">Truth</option>
            <option value="rumor">Rumor</option>
          </select>
        </div>

        <div class="form-group">
          <label for="excerpt">Short Summary</label>
          <textarea id="excerpt" placeholder="Write a short summary"></textarea>
        </div>

        <div class="form-group">
          <label for="content">Full Content</label>
          <textarea id="content" placeholder="Write the full article"></textarea>
        </div>

        <div class="form-group">
          <label for="sourceUrl">Source URL</label>
          <input type="url" id="sourceUrl" placeholder="https://example.com/source" />
        </div>

        <div class="form-group">
          <label for="imageFile">Upload Image</label>
          <input type="file" id="imageFile" accept="image/*" />
          <div class="help-text">If you do not upload a new image, the old image stays.</div>
          <img id="imagePreview" class="preview-img hidden" alt="Preview" />
        </div>

        <div class="form-group">
          <label for="imageUrl">Image URL</label>
          <input type="text" id="imageUrl" placeholder="Uploaded image URL will appear here" />
        </div>

        <div class="checkbox-row">
          <input type="checkbox" id="published" checked />
          <label for="published" style="margin:0;">Published</label>
        </div>

        <div style="height: 14px;"></div>

        <div class="btn-row">
          <button class="btn btn-success" id="saveBtn">Save Post</button>
          <button class="btn btn-secondary" id="resetBtn">Clear Form</button>
        </div>

        <div id="formStatus" class="status-box"></div>
      </div>

      <div class="card panel">
        <h3>All Posts</h3>

        <div class="toolbar">
          <input type="text" id="searchInput" placeholder="Search posts by title..." />
        </div>

        <div id="postsList" class="posts-list">
          <div class="empty">Loading posts...</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "YOUR_SUPABASE_URL";
    const SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY";
    const STORAGE_BUCKET = "news-images";
    const TABLE_NAME = "posts";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let editingId = null;
    let allPosts = [];

    const loginView = document.getElementById("loginView");
    const adminView = document.getElementById("adminView");

    const loginEmail = document.getElementById("loginEmail");
    const loginPassword = document.getElementById("loginPassword");
    const loginBtn = document.getElementById("loginBtn");
    const loginStatus = document.getElementById("loginStatus");

    const logoutBtn = document.getElementById("logoutBtn");
    const refreshBtn = document.getElementById("refreshBtn");

    const formTitle = document.getElementById("formTitle");
    const titleInput = document.getElementById("title");
    const slugInput = document.getElementById("slug");
    const categoryInput = document.getElementById("category");
    const verdictInput = document.getElementById("verdict");
    const excerptInput = document.getElementById("excerpt");
    const contentInput = document.getElementById("content");
    const sourceUrlInput = document.getElementById("sourceUrl");
    const imageFileInput = document.getElementById("imageFile");
    const imageUrlInput = document.getElementById("imageUrl");
    const imagePreview = document.getElementById("imagePreview");
    const publishedInput = document.getElementById("published");
    const saveBtn = document.getElementById("saveBtn");
    const resetBtn = document.getElementById("resetBtn");
    const formStatus = document.getElementById("formStatus");

    const postsList = document.getElementById("postsList");
    const searchInput = document.getElementById("searchInput");

    function showStatus(el, message, type = "info") {
      el.className = `status-box show status-${type}`;
      el.textContent = message;
    }

    function hideStatus(el) {
      el.className = "status-box";
      el.textContent = "";
    }

    function slugify(text) {
      return (text || "")
        .toLowerCase()
        .trim()
        .replace(/[^a-z0-9\s-]/g, "")
        .replace(/\s+/g, "-")
        .replace(/-+/g, "-");
    }

    function formatDate(dateString) {
      if (!dateString) return "";
      const d = new Date(dateString);
      return d.toLocaleString();
    }

    function escapeHtml(str = "") {
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function resetForm() {
      editingId = null;
      formTitle.textContent = "Create Post";
      titleInput.value = "";
      slugInput.value = "";
      categoryInput.value = "";
      verdictInput.value = "truth";
      excerptInput.value = "";
      contentInput.value = "";
      sourceUrlInput.value = "";
      imageFileInput.value = "";
      imageUrlInput.value = "";
      publishedInput.checked = true;
      imagePreview.src = "";
      imagePreview.classList.add("hidden");
      hideStatus(formStatus);
    }

    function fillForm(post) {
      editingId = post.id;
      formTitle.textContent = "Edit Post";
      titleInput.value = post.title || "";
      slugInput.value = post.slug || "";
      categoryInput.value = post.category || "";
      verdictInput.value = post.verdict || "truth";
      excerptInput.value = post.excerpt || "";
      contentInput.value = post.content || "";
      sourceUrlInput.value = post.source_url || "";
      imageUrlInput.value = post.image_url || "";
      publishedInput.checked = !!post.published;

      if (post.image_url) {
        imagePreview.src = post.image_url;
        imagePreview.classList.remove("hidden");
      } else {
        imagePreview.src = "";
        imagePreview.classList.add("hidden");
      }

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    async function uploadImage(file) {
      if (!file) return imageUrlInput.value.trim() || null;

      const ext = file.name.split(".").pop();
      const fileName = `${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
      const filePath = `posts/${fileName}`;

      const { error: uploadError } = await supabaseClient.storage
        .from(STORAGE_BUCKET)
        .upload(filePath, file, {
          cacheControl: "3600",
          upsert: false
        });

      if (uploadError) {
        throw uploadError;
      }

      const { data } = supabaseClient.storage
        .from(STORAGE_BUCKET)
        .getPublicUrl(filePath);

      return data.publicUrl;
    }

    async function fetchPosts() {
      postsList.innerHTML = '<div class="empty">Loading posts...</div>';

      const { data, error } = await supabaseClient
        .from(TABLE_NAME)
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        postsList.innerHTML = `<div class="empty">Could not load posts: ${escapeHtml(error.message)}</div>`;
        return;
      }

      allPosts = data || [];
      renderPosts(allPosts);
    }

    function renderPosts(posts) {
      if (!posts.length) {
        postsList.innerHTML = '<div class="empty">No posts found.</div>';
        return;
      }

      postsList.innerHTML = posts.map(post => {
        const verdictClass = post.verdict === "rumor" ? "badge-rumor" : "badge-truth";
        const verdictText = post.verdict === "rumor" ? "Rumor" : "Truth";

        return `
          <div class="post-card">
            <h4>${escapeHtml(post.title || "Untitled")}</h4>
            <div class="meta">
              <span class="badge ${verdictClass}">${verdictText}</span>
              <span class="badge badge-category">${escapeHtml(post.category || "General")}</span>
              <span class="badge badge-category">${post.published ? "Published" : "Draft"}</span>
            </div>
            <div class="post-excerpt">${escapeHtml(post.excerpt || "")}</div>
            <div class="small">Created: ${escapeHtml(formatDate(post.created_at))}</div>
            <div class="small">Slug: ${escapeHtml(post.slug || "")}</div>
            <div style="height: 12px;"></div>
            <div class="post-actions">
              <button class="btn btn-secondary" onclick="handleEdit('${post.id}')">Edit</button>
              <button class="btn btn-danger" onclick="handleDelete('${post.id}')">Delete</button>
            </div>
          </div>
        `;
      }).join("");
    }

    async function savePost() {
      hideStatus(formStatus);

      const title = titleInput.value.trim();
      const slug = (slugInput.value.trim() || slugify(title));
      const category = categoryInput.value.trim();
      const verdict = verdictInput.value;
      const excerpt = excerptInput.value.trim();
      const content = contentInput.value.trim();
      const source_url = sourceUrlInput.value.trim();
      const published = publishedInput.checked;

      if (!title) {
        showStatus(formStatus, "Title is required.", "error");
        return;
      }

      if (!slug) {
        showStatus(formStatus, "Slug is required.", "error");
        return;
      }

      try {
        showStatus(formStatus, "Saving post...", "info");

        const uploadedImageUrl = await uploadImage(imageFileInput.files[0]);

        const payload = {
          title,
          slug,
          category,
          verdict,
          excerpt,
          content,
          source_url,
          image_url: uploadedImageUrl || imageUrlInput.value.trim() || null,
          published,
          updated_at: new Date().toISOString()
        };

        let response;

        if (editingId) {
          response = await supabaseClient
            .from(TABLE_NAME)
            .update(payload)
            .eq("id", editingId);
        } else {
          payload.created_at = new Date().toISOString();
          response = await supabaseClient
            .from(TABLE_NAME)
            .insert([payload]);
        }

        if (response.error) {
          throw response.error;
        }

        showStatus(formStatus, editingId ? "Post updated successfully." : "Post created successfully.", "success");
        resetForm();
        await fetchPosts();
      } catch (error) {
        showStatus(formStatus, error.message || "Something went wrong while saving.", "error");
      }
    }

    async function deletePost(id) {
      const ok = confirm("Are you sure you want to delete this post?");
      if (!ok) return;

      const { error } = await supabaseClient
        .from(TABLE_NAME)
        .delete()
        .eq("id", id);

      if (error) {
        alert("Delete failed: " + error.message);
        return;
      }

      if (editingId === id) {
        resetForm();
      }

      await fetchPosts();
      alert("Post deleted successfully.");
    }

    function filterPosts() {
      const keyword = searchInput.value.trim().toLowerCase();
      if (!keyword) {
        renderPosts(allPosts);
        return;
      }

      const filtered = allPosts.filter(post =>
        (post.title || "").toLowerCase().includes(keyword)
      );

      renderPosts(filtered);
    }

    async function login() {
      hideStatus(loginStatus);

      const email = loginEmail.value.trim();
      const password = loginPassword.value;

      if (!email || !password) {
        showStatus(loginStatus, "Email and password are required.", "error");
        return;
      }

      showStatus(loginStatus, "Signing in...", "info");

      const { error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        showStatus(loginStatus, error.message || "Login failed.", "error");
        return;
      }

      showStatus(loginStatus, "Login successful.", "success");
      await checkSession();
    }

    async function logout() {
      await supabaseClient.auth.signOut();
      loginView.classList.remove("hidden");
      adminView.classList.add("hidden");
      loginPassword.value = "";
      hideStatus(loginStatus);
      resetForm();
    }

    async function checkSession() {
      const { data, error } = await supabaseClient.auth.getSession();

      if (error || !data.session) {
        loginView.classList.remove("hidden");
        adminView.classList.add("hidden");
        return;
      }

      loginView.classList.add("hidden");
      adminView.classList.remove("hidden");
      await fetchPosts();
    }

    imageFileInput.addEventListener("change", () => {
      const file = imageFileInput.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (e) => {
        imagePreview.src = e.target.result;
        imagePreview.classList.remove("hidden");
      };
      reader.readAsDataURL(file);
    });

    titleInput.addEventListener("input", () => {
      if (!slugInput.dataset.editedManually) {
        slugInput.value = slugify(titleInput.value);
      }
    });

    slugInput.addEventListener("input", () => {
      slugInput.dataset.editedManually = slugInput.value.trim() ? "true" : "";
    });

    loginBtn.addEventListener("click", login);
    logoutBtn.addEventListener("click", logout);
    refreshBtn.addEventListener("click", fetchPosts);
    saveBtn.addEventListener("click", savePost);
    resetBtn.addEventListener("click", resetForm);
    searchInput.addEventListener("input", filterPosts);

    loginPassword.addEventListener("keydown", (e) => {
      if (e.key === "Enter") login();
    });

    window.handleEdit = function(id) {
      const post = allPosts.find(item => item.id === id);
      if (post) fillForm(post);
    };

    window.handleDelete = function(id) {
      deletePost(id);
    };

    checkSession();
  </script>
</body>
</html>
