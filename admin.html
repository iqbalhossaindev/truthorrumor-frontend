<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Truth or Rumor Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #081224;
      --panel: #0f1b31;
      --panel-2: #13233f;
      --line: rgba(255, 255, 255, 0.08);
      --text: #f3f4f6;
      --muted: #9ca3af;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --success: #16a34a;
      --success-bg: rgba(22, 163, 74, 0.16);
      --danger: #dc2626;
      --danger-hover: #b91c1c;
      --danger-bg: rgba(220, 38, 38, 0.16);
      --info: #0284c7;
      --info-bg: rgba(2, 132, 199, 0.16);
      --input: #0b1630;
      --radius: 18px;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.25);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #06101f 0%, #081224 100%);
      color: var(--text);
    }

    .hidden {
      display: none !important;
    }

    .page {
      width: min(1180px, calc(100% - 32px));
      margin: 32px auto;
    }

    .card {
      background: rgba(15, 27, 49, 0.96);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .login-wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 16px;
    }

    .login-card {
      width: min(460px, 100%);
      padding: 28px;
    }

    .login-card h1 {
      margin: 0 0 12px;
      font-size: 28px;
    }

    .login-card p {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 15px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 20px 24px;
      margin-bottom: 20px;
    }

    .header h1 {
      margin: 0;
      font-size: 28px;
    }

    .header p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .top-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .dashboard {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 20px;
    }

    .panel {
      padding: 22px;
    }

    .panel h2 {
      margin: 0 0 18px;
      font-size: 22px;
    }

    .form-group {
      margin-bottom: 14px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 700;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 13px 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--input);
      color: var(--text);
      font-size: 15px;
      outline: none;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.16);
    }

    textarea {
      resize: vertical;
      min-height: 120px;
    }

    .small-text {
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    .btn {
      border: 0;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
    }

    .btn-secondary {
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--line);
    }

    .btn-secondary:hover {
      background: #1a2f52;
    }

    .btn-success {
      background: var(--success);
      color: white;
    }

    .btn-danger {
      background: var(--danger);
      color: white;
    }

    .btn-danger:hover {
      background: var(--danger-hover);
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 4px;
    }

    .status-box {
      display: none;
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
    }

    .status-box.show {
      display: block;
    }

    .status-success {
      background: var(--success-bg);
      border: 1px solid rgba(22, 163, 74, 0.35);
      color: #dcfce7;
    }

    .status-error {
      background: var(--danger-bg);
      border: 1px solid rgba(220, 38, 38, 0.35);
      color: #fee2e2;
    }

    .status-info {
      background: var(--info-bg);
      border: 1px solid rgba(2, 132, 199, 0.35);
      color: #e0f2fe;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 8px 0 12px;
    }

    .checkbox-row input {
      width: auto;
      margin: 0;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .toolbar input {
      flex: 1;
      min-width: 200px;
    }

    .posts-list {
      display: grid;
      gap: 14px;
    }

    .post-card {
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(19, 35, 63, 0.78);
    }

    .post-card h3 {
      margin: 0 0 10px;
      font-size: 18px;
      line-height: 1.4;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid transparent;
    }

    .badge-truth {
      background: rgba(22, 163, 74, 0.16);
      border-color: rgba(22, 163, 74, 0.35);
      color: #dcfce7;
    }

    .badge-rumor {
      background: rgba(220, 38, 38, 0.16);
      border-color: rgba(220, 38, 38, 0.35);
      color: #fee2e2;
    }

    .badge-category {
      background: rgba(37, 99, 235, 0.16);
      border-color: rgba(37, 99, 235, 0.35);
      color: #dbeafe;
    }

    .badge-draft {
      background: rgba(245, 158, 11, 0.16);
      border-color: rgba(245, 158, 11, 0.35);
      color: #fef3c7;
    }

    .post-excerpt {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 12px;
      white-space: pre-wrap;
    }

    .post-meta-line {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
      margin-bottom: 12px;
      word-break: break-word;
    }

    .post-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .preview-img {
      width: 100%;
      max-height: 240px;
      object-fit: cover;
      border-radius: 12px;
      border: 1px solid var(--line);
      margin-top: 10px;
    }

    .empty {
      color: var(--muted);
      font-size: 14px;
      padding: 8px 0;
    }

    @media (max-width: 980px) {
      .dashboard {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .form-row {
        grid-template-columns: 1fr;
      }

      .header {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div id="loginView" class="login-wrap">
    <div class="card login-card">
      <h1>Admin Login</h1>
      <p>Login with your Supabase admin email and password.</p>

      <div class="form-group">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" placeholder="admin@example.com" />
      </div>

      <div class="form-group">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" placeholder="Enter password" />
      </div>

      <button type="button" class="btn btn-primary" id="loginBtn">Login</button>
      <div id="loginStatus" class="status-box"></div>
    </div>
  </div>

  <div id="adminView" class="page hidden">
    <div class="card header">
      <div>
        <h1>Truth or Rumor Admin</h1>
        <p>Create, edit, search, and delete posts.</p>
      </div>

      <div class="top-actions">
        <button type="button" class="btn btn-secondary" id="refreshBtn">Refresh Posts</button>
        <button type="button" class="btn btn-danger" id="logoutBtn">Logout</button>
      </div>
    </div>

    <div class="dashboard">
      <section class="card panel">
        <h2 id="formTitle">Create Post</h2>

        <div class="form-group">
          <label for="title">Title</label>
          <input type="text" id="title" placeholder="Write the post title" />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="slug">Slug</label>
            <input type="text" id="slug" placeholder="example-post-title" />
            <div class="small-text">If empty, slug will be created from title.</div>
          </div>

          <div class="form-group">
            <label for="category">Category</label>
            <input type="text" id="category" placeholder="World, Politics, Tech, Sports" />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="verdict">Verdict</label>
            <select id="verdict">
              <option value="truth">Truth</option>
              <option value="rumor">Rumor</option>
            </select>
          </div>

          <div class="form-group">
            <label for="sourceUrl">Source URL</label>
            <input type="url" id="sourceUrl" placeholder="https://example.com/source" />
          </div>
        </div>

        <div class="form-group">
          <label for="excerpt">Short Summary</label>
          <textarea id="excerpt" placeholder="Write a short summary"></textarea>
        </div>

        <div class="form-group">
          <label for="content">Full Content</label>
          <textarea id="content" placeholder="Write the full article"></textarea>
        </div>

        <div class="form-group">
          <label for="imageFile">Upload Image</label>
          <input type="file" id="imageFile" accept="image/*" />
          <div class="small-text">If you do not upload a new image, the old image stays.</div>
        </div>

        <div class="form-group">
          <label for="imageUrl">Image URL</label>
          <input type="text" id="imageUrl" placeholder="Uploaded image URL will appear here" />
          <img id="imagePreview" class="preview-img hidden" alt="Image preview" />
        </div>

        <div class="checkbox-row">
          <input type="checkbox" id="published" checked />
          <label for="published" style="margin:0;">Published</label>
        </div>

        <div class="btn-row">
          <button type="button" class="btn btn-success" id="saveBtn">Save Post</button>
          <button type="button" class="btn btn-secondary" id="resetBtn">Clear Form</button>
        </div>

        <div id="formStatus" class="status-box"></div>
      </section>

      <section class="card panel">
        <h2>All Posts</h2>

        <div class="toolbar">
          <input type="text" id="searchInput" placeholder="Search posts by title or category" />
        </div>

        <div id="postsList" class="posts-list">
          <div class="empty">Loading posts...</div>
        </div>
      </section>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://bsnezcbmsbsememwqsjs.supabase.co";
    const SUPABASE_KEY = "sb_publishable_HTgjJsMcfGgIJaUSAzXTfw_yQ2dD_Uy";
    const STORAGE_BUCKET = "news-images";
    const TABLE_NAME = "posts";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let editingId = null;
    let allPosts = [];
    let slugTouched = false;

    const loginView = document.getElementById("loginView");
    const adminView = document.getElementById("adminView");

    const loginEmail = document.getElementById("loginEmail");
    const loginPassword = document.getElementById("loginPassword");
    const loginBtn = document.getElementById("loginBtn");
    const loginStatus = document.getElementById("loginStatus");

    const refreshBtn = document.getElementById("refreshBtn");
    const logoutBtn = document.getElementById("logoutBtn");

    const formTitle = document.getElementById("formTitle");
    const titleInput = document.getElementById("title");
    const slugInput = document.getElementById("slug");
    const categoryInput = document.getElementById("category");
    const verdictInput = document.getElementById("verdict");
    const excerptInput = document.getElementById("excerpt");
    const contentInput = document.getElementById("content");
    const sourceUrlInput = document.getElementById("sourceUrl");
    const imageFileInput = document.getElementById("imageFile");
    const imageUrlInput = document.getElementById("imageUrl");
    const imagePreview = document.getElementById("imagePreview");
    const publishedInput = document.getElementById("published");
    const saveBtn = document.getElementById("saveBtn");
    const resetBtn = document.getElementById("resetBtn");
    const formStatus = document.getElementById("formStatus");

    const searchInput = document.getElementById("searchInput");
    const postsList = document.getElementById("postsList");

    function showStatus(element, message, type) {
      element.className = "status-box show status-" + type;
      element.textContent = message;
    }

    function hideStatus(element) {
      element.className = "status-box";
      element.textContent = "";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function slugify(text) {
      return String(text || "")
        .toLowerCase()
        .trim()
        .replace(/[^a-z0-9\\s-]/g, "")
        .replace(/\\s+/g, "-")
        .replace(/-+/g, "-")
        .replace(/^-+|-+$/g, "");
    }

    function formatDate(value) {
      if (!value) return "";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "";
      return date.toLocaleString();
    }

    function previewImage(url) {
      const cleanUrl = String(url || "").trim();
      if (!cleanUrl) {
        imagePreview.src = "";
        imagePreview.classList.add("hidden");
        return;
      }
      imagePreview.src = cleanUrl;
      imagePreview.classList.remove("hidden");
    }

    function resetForm() {
      editingId = null;
      slugTouched = false;
      formTitle.textContent = "Create Post";
      titleInput.value = "";
      slugInput.value = "";
      categoryInput.value = "";
      verdictInput.value = "truth";
      excerptInput.value = "";
      contentInput.value = "";
      sourceUrlInput.value = "";
      imageFileInput.value = "";
      imageUrlInput.value = "";
      publishedInput.checked = true;
      previewImage("");
      hideStatus(formStatus);
    }

    function fillForm(post) {
      editingId = post.id;
      slugTouched = true;
      formTitle.textContent = "Edit Post";

      titleInput.value = post.title || "";
      slugInput.value = post.slug || "";
      categoryInput.value = post.category || "";
      verdictInput.value = post.verdict || "truth";
      excerptInput.value = post.excerpt || "";
      contentInput.value = post.content || "";
      sourceUrlInput.value = post.source_url || "";
      imageUrlInput.value = post.image_url || "";
      publishedInput.checked = Boolean(post.published);
      imageFileInput.value = "";

      previewImage(post.image_url || "");
      hideStatus(formStatus);

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function renderPosts(posts) {
      if (!Array.isArray(posts) || posts.length === 0) {
        postsList.innerHTML = '<div class="empty">No posts found.</div>';
        return;
      }

      postsList.innerHTML = posts.map(function(post) {
        const verdictClass = post.verdict === "rumor" ? "badge-rumor" : "badge-truth";
        const verdictText = post.verdict === "rumor" ? "Rumor" : "Truth";
        const publishBadge = post.published
          ? '<span class="badge badge-category">Published</span>'
          : '<span class="badge badge-draft">Draft</span>';

        return `
          <article class="post-card">
            <h3>${escapeHtml(post.title || "Untitled")}</h3>
            <div class="meta">
              <span class="badge ${verdictClass}">${verdictText}</span>
              <span class="badge badge-category">${escapeHtml(post.category || "General")}</span>
              ${publishBadge}
            </div>
            <div class="post-excerpt">${escapeHtml(post.excerpt || "")}</div>
            <div class="post-meta-line">
              Slug: ${escapeHtml(post.slug || "")}<br>
              Created: ${escapeHtml(formatDate(post.created_at))}<br>
              Updated: ${escapeHtml(formatDate(post.updated_at))}
            </div>
            <div class="post-actions">
              <button type="button" class="btn btn-secondary edit-post-btn" data-id="${escapeHtml(post.id)}">Edit</button>
              <button type="button" class="btn btn-danger delete-post-btn" data-id="${escapeHtml(post.id)}">Delete</button>
            </div>
          </article>
        `;
      }).join("");
    }

    async function uploadImage(file) {
      if (!file) {
        return String(imageUrlInput.value || "").trim() || null;
      }

      const extension = file.name.includes(".") ? file.name.split(".").pop() : "jpg";
      const fileName = Date.now() + "-" + Math.random().toString(36).slice(2) + "." + extension;
      const filePath = "posts/" + fileName;

      const uploadResult = await supabaseClient.storage
        .from(STORAGE_BUCKET)
        .upload(filePath, file, {
          cacheControl: "3600",
          upsert: false
        });

      if (uploadResult.error) {
        throw uploadResult.error;
      }

      const publicUrlResult = supabaseClient.storage
        .from(STORAGE_BUCKET)
        .getPublicUrl(filePath);

      const publicUrl = publicUrlResult?.data?.publicUrl || "";
      if (!publicUrl) {
        throw new Error("Image uploaded, but public URL could not be created.");
      }

      return publicUrl;
    }

    async function fetchPosts() {
      postsList.innerHTML = '<div class="empty">Loading posts...</div>';

      const result = await supabaseClient
        .from(TABLE_NAME)
        .select("*")
        .order("created_at", { ascending: false });

      if (result.error) {
        postsList.innerHTML = '<div class="empty">Could not load posts: ' + escapeHtml(result.error.message) + '</div>';
        return;
      }

      allPosts = Array.isArray(result.data) ? result.data : [];
      renderPosts(allPosts);
    }

    async function savePost() {
      hideStatus(formStatus);

      const title = titleInput.value.trim();
      const slug = slugInput.value.trim() || slugify(title);
      const category = categoryInput.value.trim();
      const verdict = verdictInput.value;
      const excerpt = excerptInput.value.trim();
      const content = contentInput.value.trim();
      const sourceUrl = sourceUrlInput.value.trim();
      const published = publishedInput.checked;

      if (!title) {
        showStatus(formStatus, "Title is required.", "error");
        return;
      }

      if (!slug) {
        showStatus(formStatus, "Slug is required.", "error");
        return;
      }

      try {
        saveBtn.disabled = true;
        showStatus(formStatus, "Saving post...", "info");

        const finalImageUrl = await uploadImage(imageFileInput.files[0]);

        const payload = {
          title: title,
          slug: slug,
          category: category || null,
          verdict: verdict,
          excerpt: excerpt || null,
          content: content || null,
          source_url: sourceUrl || null,
          image_url: finalImageUrl || null,
          published: published,
          updated_at: new Date().toISOString()
        };

        let result;

        if (editingId) {
          result = await supabaseClient
            .from(TABLE_NAME)
            .update(payload)
            .eq("id", editingId);
        } else {
          payload.created_at = new Date().toISOString();
          result = await supabaseClient
            .from(TABLE_NAME)
            .insert([payload]);
        }

        if (result.error) {
          throw result.error;
        }

        showStatus(formStatus, editingId ? "Post updated successfully." : "Post created successfully.", "success");
        resetForm();
        await fetchPosts();
      } catch (error) {
        showStatus(formStatus, error.message || "Could not save the post.", "error");
      } finally {
        saveBtn.disabled = false;
      }
    }

    async function deletePost(id) {
      const confirmed = window.confirm("Are you sure you want to delete this post?");
      if (!confirmed) return;

      const result = await supabaseClient
        .from(TABLE_NAME)
        .delete()
        .eq("id", id);

      if (result.error) {
        window.alert("Delete failed: " + result.error.message);
        return;
      }

      if (editingId === id) {
        resetForm();
      }

      await fetchPosts();
      window.alert("Post deleted successfully.");
    }

    function filterPosts() {
      const keyword = searchInput.value.trim().toLowerCase();

      if (!keyword) {
        renderPosts(allPosts);
        return;
      }

      const filtered = allPosts.filter(function(post) {
        const title = String(post.title || "").toLowerCase();
        const category = String(post.category || "").toLowerCase();
        const excerpt = String(post.excerpt || "").toLowerCase();
        return title.includes(keyword) || category.includes(keyword) || excerpt.includes(keyword);
      });

      renderPosts(filtered);
    }

    function setViewForSession(session) {
      if (session) {
        loginView.classList.add("hidden");
        adminView.classList.remove("hidden");
      } else {
        loginView.classList.remove("hidden");
        adminView.classList.add("hidden");
      }
    }

    async function login() {
      hideStatus(loginStatus);

      const email = loginEmail.value.trim();
      const password = loginPassword.value;

      if (!email || !password) {
        showStatus(loginStatus, "Email and password are required.", "error");
        return;
      }

      try {
        loginBtn.disabled = true;
        showStatus(loginStatus, "Signing in...", "info");

        const result = await supabaseClient.auth.signInWithPassword({
          email: email,
          password: password
        });

        if (result.error) {
          throw result.error;
        }

        showStatus(loginStatus, "Login successful.", "success");
        setViewForSession(result.data.session);
        await fetchPosts();
      } catch (error) {
        showStatus(loginStatus, error.message || "Login failed.", "error");
      } finally {
        loginBtn.disabled = false;
      }
    }

    async function logout() {
      const result = await supabaseClient.auth.signOut();

      if (result.error) {
        window.alert("Logout failed: " + result.error.message);
        return;
      }

      setViewForSession(null);
      loginPassword.value = "";
      hideStatus(loginStatus);
      resetForm();
    }

    async function checkSession() {
      const result = await supabaseClient.auth.getSession();

      if (result.error) {
        setViewForSession(null);
        showStatus(loginStatus, result.error.message || "Could not check session.", "error");
        return;
      }

      const session = result.data.session;
      setViewForSession(session);

      if (session) {
        await fetchPosts();
      }
    }

    titleInput.addEventListener("input", function() {
      if (!slugTouched) {
        slugInput.value = slugify(titleInput.value);
      }
    });

    slugInput.addEventListener("input", function() {
      slugTouched = slugInput.value.trim() !== "";
    });

    imageFileInput.addEventListener("change", function() {
      const file = imageFileInput.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(event) {
        imagePreview.src = event.target.result;
        imagePreview.classList.remove("hidden");
      };
      reader.readAsDataURL(file);
    });

    imageUrlInput.addEventListener("input", function() {
      if (imageFileInput.files.length === 0) {
        previewImage(imageUrlInput.value);
      }
    });

    loginBtn.addEventListener("click", login);
    saveBtn.addEventListener("click", savePost);
    resetBtn.addEventListener("click", resetForm);
    refreshBtn.addEventListener("click", fetchPosts);
    logoutBtn.addEventListener("click", logout);
    searchInput.addEventListener("input", filterPosts);

    loginEmail.addEventListener("keydown", function(event) {
      if (event.key === "Enter") login();
    });

    loginPassword.addEventListener("keydown", function(event) {
      if (event.key === "Enter") login();
    });

    postsList.addEventListener("click", function(event) {
      const editButton = event.target.closest(".edit-post-btn");
      const deleteButton = event.target.closest(".delete-post-btn");

      if (editButton) {
        const id = editButton.getAttribute("data-id");
        const post = allPosts.find(function(item) {
          return String(item.id) === String(id);
        });
        if (post) fillForm(post);
      }

      if (deleteButton) {
        const id = deleteButton.getAttribute("data-id");
        deletePost(id);
      }
    });

    supabaseClient.auth.onAuthStateChange(function(event, session) {
      setViewForSession(session);
      if (session) {
        fetchPosts();
      }
    });

    checkSession();
  </script>
</body>
</html>
