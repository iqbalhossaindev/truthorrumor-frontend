        <p class="modal-note">ফন্ট সাইজ</p>
        <div class="tool-row">
          <button class="tool-btn" onclick="changeFontSize(-1)">A-</button>
          <button class="tool-btn" onclick="changeFontSize(1)">A+</button>
        </div>
      </div>

      <div class="access-group">
        <p class="modal-note">লাইন ফাঁক</p>
        <div class="tool-row">
          <button class="tool-btn" onclick="changeLineHeight(-0.1)">কম</button>
          <button class="tool-btn" onclick="changeLineHeight(0.1)">বেশি</button>
        </div>
      </div>

      <div class="access-group">
        <p class="modal-note">রিসেট</p>
        <div class="tool-row">
          <button class="tool-btn" onclick="resetReadingSettings()">সেটিংস রিসেট</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast">সম্পন্ন</div>

  <div class="wrap">
    <div class="topbar">
      <a class="back-btn" href="/bd">হোমে ফিরে যান</a>
      <div class="brand">TruthOrRumor Bangla</div>
    </div>

    <div id="articleRoot" class="article-card">
      <div class="state">প্রতিবেদন লোড হচ্ছে...</div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://bsnezcbmsbsememwqsjs.supabase.co";
    const SUPABASE_KEY = "sb_publishable_HTgjJsMcfGgIJaUSAzXTfw_yQ2dD_Uy";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const readerPrefs = {
      theme: "dark",
      fontSize: 18,
      lineHeight: 1.9,
      width: "860px"
    };

    let toastTimer = null;
    let currentUtterance = null;
    let listenButtonActive = false;

    function safeJsonParse(value, fallback) {
      try {
        return JSON.parse(value);
      } catch {
        return fallback;
      }
    }

    function escapeHtml(text) {
      return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function normalizeWhitespace(value) {
      return String(value || "").replace(/\s+/g, " ").trim();
    }

    function plainText(value) {
      return normalizeWhitespace(String(value || "").replace(/<[^>]*>/g, " "));
    }

    function trimDescription(value, maxLength = 160) {
      const cleaned = plainText(value);
      if (cleaned.length <= maxLength) return cleaned;
      return cleaned.slice(0, maxLength - 1).trimEnd() + "…";
    }

    function absoluteUrl(value) {
      const fallback = window.location.origin + "/logo.png";
      if (!value) return fallback;
      try {
        return new URL(value, window.location.origin).href;
      } catch {
        return fallback;
      }
    }

    function isoDateTime(value) {
      const date = value ? new Date(value) : new Date();
      if (Number.isNaN(date.getTime())) return new Date().toISOString();
      return date.toISOString();
    }

    function setMetaName(name, content) {
      let el = document.querySelector(`meta[name="${name}"]`);
      if (!el) {
        el = document.createElement("meta");
        el.setAttribute("name", name);
        document.head.appendChild(el);
      }
      el.setAttribute("content", content || "");
    }

    function setMetaProperty(property, content) {
      let el = document.querySelector(`meta[property="${property}"]`);
      if (!el) {
        el = document.createElement("meta");
        el.setAttribute("property", property);
        document.head.appendChild(el);
      }
      el.setAttribute("content", content || "");
    }

    function setCanonical(href) {
      let el = document.querySelector('link[rel="canonical"]');
      if (!el) {
        el = document.createElement("link");
        el.setAttribute("rel", "canonical");
        document.head.appendChild(el);
      }
      el.setAttribute("href", href || window.location.href);
    }

    function setJsonLd(id, data) {
      let el = document.getElementById(id);
      if (!el) {
        el = document.createElement("script");
        el.type = "application/ld+json";
        el.id = id;
        document.head.appendChild(el);
      }
      el.textContent = JSON.stringify(data);
    }

    function setRobots(content) {
      setMetaName("robots", content);
    }

    function applyNoIndex(titleText, descriptionText) {
      document.title = titleText;
      setMetaName("description", descriptionText || titleText);
      setRobots("noindex, nofollow");
      setCanonical(window.location.href);
    }

    function applyArticleSeo(article) {
      const slug = article.slug || getSlugFromPath();
      const title = article.title || "TruthOrRumor Bangla";
      const summary = article.excerpt || article.summary || "";
      const content = article.content || "";
      const description = trimDescription(summary || content || title);
      const imageUrl = absoluteUrl(article.image_url);
      const articleUrl = window.location.origin + "/bd/article/" + encodeURIComponent(slug);
      const publishedAt = isoDateTime(article.created_at);
      const updatedAt = isoDateTime(article.updated_at || article.created_at);
      const category = article.category || "বাংলা খবর";
      const country = article.country || "বাংলাদেশ";
      const publisherLogo = absoluteUrl("/logo.png");

      document.title = title + " | TruthOrRumor Bangla";
      setMetaName("description", description);
      setMetaName("robots", "index,follow,max-image-preview:large");
      setCanonical(articleUrl);
      setMetaProperty("og:type", "article");
      setMetaProperty("og:site_name", "TruthOrRumor Bangla");
      setMetaProperty("og:url", articleUrl);
      setMetaProperty("og:locale", "bn_BD");
      setMetaProperty("og:title", title);
      setMetaProperty("og:description", description);
      setMetaProperty("og:image", imageUrl);
      setMetaProperty("og:image:alt", title);
      setMetaProperty("article:published_time", publishedAt);
      setMetaProperty("article:modified_time", updatedAt);
      setMetaProperty("article:section", category);
      setMetaName("twitter:card", "summary_large_image");
      setMetaName("twitter:title", title);
      setMetaName("twitter:description", description);
      setMetaName("twitter:image", imageUrl);
      setMetaName("twitter:url", articleUrl);

      setJsonLd("articleSchema", {
        "@context": "https://schema.org",
        "@type": "NewsArticle",
        mainEntityOfPage: articleUrl,
        headline: title,
        description,
        image: [imageUrl],
        datePublished: publishedAt,
        dateModified: updatedAt,
        inLanguage: "bn-BD",
        articleSection: category,
        isAccessibleForFree: true,
        author: {
          "@type": "Organization",
          name: "TruthOrRumor Bangla"
        },
        publisher: {
          "@type": "Organization",
          name: "TruthOrRumor Bangla",
          logo: {
            "@type": "ImageObject",
            url: publisherLogo
          }
        },
        about: country
      });

      setJsonLd("breadcrumbSchema", {
        "@context": "https://schema.org",
        "@type": "BreadcrumbList",
        itemListElement: [
          {
            "@type": "ListItem",
            position: 1,
            name: "হোম",
            item: window.location.origin + "/bd"
          },
          {
            "@type": "ListItem",
            position: 2,
            name: category,
            item: window.location.origin + "/bd"
          },
          {
            "@type": "ListItem",
            position: 3,
            name: title,
            item: articleUrl
          }
        ]
      });
    }

    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("show"), 1800);
    }

    function loadReaderPrefs() {
      const saved = safeJsonParse(localStorage.getItem("tor_reader_prefs_bd"), null);
      if (saved) {
        if (saved.theme) readerPrefs.theme = saved.theme;
        if (saved.fontSize) readerPrefs.fontSize = saved.fontSize;
        if (saved.lineHeight) readerPrefs.lineHeight = saved.lineHeight;
        if (saved.width) readerPrefs.width = saved.width;
      }
    }

    function saveReaderPrefs() {
      localStorage.setItem("tor_reader_prefs_bd", JSON.stringify(readerPrefs));
    }

    function applyReaderPrefs() {
      document.body.dataset.theme = readerPrefs.theme;
      document.documentElement.style.setProperty("--reader-font-size", readerPrefs.fontSize + "px");
      document.documentElement.style.setProperty("--reader-line-height", String(readerPrefs.lineHeight));
      document.documentElement.style.setProperty("--reader-width", readerPrefs.width);
      updateAccessibilityButtons();
    }

    function updateAccessibilityButtons() {
      const ids = [
        "themeDarkBtn",
        "themeSepiaBtn",
        "themeSoftBtn",
        "widthNarrowBtn",
        "widthNormalBtn",
        "widthWideBtn"
      ];

      ids.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.classList.remove("active");
      });

      const themeMap = {
        dark: "themeDarkBtn",
        sepia: "themeSepiaBtn",
        "soft-light": "themeSoftBtn"
      };

      const themeBtn = document.getElementById(themeMap[readerPrefs.theme]);
      if (themeBtn) themeBtn.classList.add("active");

      const widthBtn =
        readerPrefs.width === "720px" ? "widthNarrowBtn" :
        readerPrefs.width === "980px" ? "widthWideBtn" :
        "widthNormalBtn";

      const widthEl = document.getElementById(widthBtn);
      if (widthEl) widthEl.classList.add("active");
    }

    function setTheme(theme) {
      readerPrefs.theme = theme;
      saveReaderPrefs();
      applyReaderPrefs();
    }

    function setReaderWidth(width) {
      readerPrefs.width = width;
      saveReaderPrefs();
      applyReaderPrefs();
    }

    function changeFontSize(delta) {
      readerPrefs.fontSize = Math.max(14, Math.min(26, readerPrefs.fontSize + delta));
      saveReaderPrefs();
      applyReaderPrefs();
    }

    function changeLineHeight(delta) {
      readerPrefs.lineHeight = Math.max(1.5, Math.min(2.4, +(readerPrefs.lineHeight + delta).toFixed(1)));
      saveReaderPrefs();
      applyReaderPrefs();
    }

    function resetReadingSettings() {
      readerPrefs.theme = "dark";
      readerPrefs.fontSize = 18;
      readerPrefs.lineHeight = 1.9;
      readerPrefs.width = "860px";
      saveReaderPrefs();
      applyReaderPrefs();
      showToast("সেটিংস রিসেট হয়েছে");
    }

    function openAccessibilityModal() {
      document.getElementById("accessibilityBackdrop").classList.add("show");
      updateAccessibilityButtons();
    }

    function closeAccessibilityModal(event) {
      if (event && event.target && event.target.id !== "accessibilityBackdrop") return;
      document.getElementById("accessibilityBackdrop").classList.remove("show");
    }

    function formatDate(value) {
      const date = value ? new Date(value) : new Date();
      if (Number.isNaN(date.getTime())) return "তারিখ পাওয়া যায়নি";
      return new Intl.DateTimeFormat("bn-BD", {
        dateStyle: "medium",
        timeStyle: "short"
      }).format(date);
    }

    function getVerifiedIcon(color) {
      return `
        <svg viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 3l6 2.5v5c0 4.3-2.6 8.1-6 9.5-3.4-1.4-6-5.2-6-9.5v-5L12 3z"></path>
          <path d="M9.3 11.8l1.8 1.8 3.7-3.8"></path>
        </svg>
      `;
    }

    function renderStatusBadge(type) {
      const isTruth = String(type || "").toLowerCase() !== "rumor";
      return isTruth
        ? `<span class="status-badge truth">${getVerifiedIcon("#22c55e")} <span>সত্য যাচাই</span></span>`
        : `<span class="status-badge rumor">${getVerifiedIcon("#ef4444")} <span>গুজব সতর্কতা</span></span>`;
    }

    function getSlugFromPath() {
      const parts = window.location.pathname.split("/").filter(Boolean);
      return decodeURIComponent(parts[parts.length - 1] || "").trim().toLowerCase();
    }

    function stopAudio() {
      if (currentUtterance) {
        window.speechSynthesis.cancel();
        currentUtterance = null;
      }
      const btn = document.getElementById("listenBtn");
      if (btn) btn.textContent = "শুনুন";
      listenButtonActive = false;
    }

    function toggleAudio(text) {
      if (!text || !text.trim()) return;

      if (listenButtonActive) {
        stopAudio();
        return;
      }

      stopAudio();

      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "bn-BD";
      currentUtterance = utterance;
      listenButtonActive = true;

      const btn = document.getElementById("listenBtn");
      if (btn) btn.textContent = "শোনা বন্ধ করুন";

      utterance.onend = stopAudio;
      utterance.onerror = stopAudio;

      try {
        window.speechSynthesis.speak(utterance);
      } catch {
        stopAudio();
      }
    }


    async function shareArticle(title, text, url) {
      const shareTitle = title || "TruthOrRumor Bangla";
      const shareText = text || "TruthOrRumor Bangla তে এই প্রতিবেদনটি পড়ুন।";
      const shareUrl = url || window.location.href;

      if (navigator.share) {
        try {
          await navigator.share({
            title: shareTitle,
            text: shareText,
            url: shareUrl
          });
          return;
        } catch (error) {
          if (error && error.name === "AbortError") return;
        }
      }

      try {
        await navigator.clipboard.writeText(shareUrl);
        showToast("লিংক কপি হয়েছে");
      } catch {
        showToast("শেয়ার লিংক কপি করা যায়নি");
      }
    }

    async function loadArticle() {
      const slug = getSlugFromPath();
      const root = document.getElementById("articleRoot");

      if (!slug) {
        applyNoIndex("প্রতিবেদন পাওয়া যায়নি | TruthOrRumor Bangla", "প্রতিবেদনের স্লাগ পাওয়া যায়নি।");
        root.innerHTML = `<div class="state">প্রতিবেদনের স্লাগ পাওয়া যায়নি।</div>`;
        return;
      }

      let article = null;

      const exactResult = await supabaseClient
        .from("posts_bd")
        .select("*")
        .eq("slug", slug)
        .eq("published", true)
        .limit(1);

      if (Array.isArray(exactResult.data) && exactResult.data.length > 0) {
        article = exactResult.data[0];
      }

      if (!article) {
        const fallbackResult = await supabaseClient
          .from("posts_bd")
          .select("*")
          .ilike("slug", slug)
          .eq("published", true)
          .limit(1);

        if (Array.isArray(fallbackResult.data) && fallbackResult.data.length > 0) {
          article = fallbackResult.data[0];
        }
      }

      if (!article) {
        applyNoIndex("প্রতিবেদন পাওয়া যায়নি | TruthOrRumor Bangla", `প্রতিবেদন পাওয়া যায়নি। Slug: ${slug}`);
        root.innerHTML = `<div class="state">প্রতিবেদন পাওয়া যায়নি।<br><br>Slug: ${escapeHtml(slug)}</div>`;
        return;
      }

      const title = article.title || "TruthOrRumor Bangla";
      const summary = article.excerpt || article.summary || "";
      const content = article.content || "";
      const imageUrl = article.image_url || "";
      const country = article.country || "বিশ্ব";
      const category = article.category || "বাংলা খবর";
      const verdict = article.verdict || "truth";
      const sourceUrl = article.source_url || "";
      const publishedAt = article.created_at || "";
      const updatedAt = article.updated_at || article.created_at || "";
      const articleUrl = "https://www.truthorrumor.com/bd/article/" + encodeURIComponent(article.slug || slug);

      applyArticleSeo(article);

      root.innerHTML = `
        ${renderStatusBadge(String(verdict).toLowerCase() === "rumor" ? "rumor" : "real")}
        <h1>${escapeHtml(title)}</h1>
        <div class="meta">
          ${escapeHtml(country)} • ${escapeHtml(category)} • প্রকাশ: ${formatDate(publishedAt)} • আপডেট: ${formatDate(updatedAt)}
        </div>
        ${summary ? `<div class="summary"><strong>সংক্ষিপ্ত সারাংশ:</strong> ${escapeHtml(summary)}</div>` : ""}
        ${imageUrl ? `<div class="hero-media"><img class="hero-image" src="${escapeHtml(imageUrl)}" alt="${escapeHtml(title)}" onerror="this.closest(\'.hero-media\').style.display=\'none\'"></div>` : ""}
        <div class="content">${escapeHtml(content)}</div>
        <div class="actions">
          <a class="action-btn primary" href="/bd">হোম</a>
          <button id="listenBtn" class="action-btn" onclick=${JSON.stringify("")}>শুনুন</button>
          <button id="shareBtn" class="action-btn" onclick=${JSON.stringify("")}>শেয়ার</button>
          ${sourceUrl ? `<a class="action-btn" href="${escapeHtml(sourceUrl)}" target="_blank" rel="noopener noreferrer">মূল সূত্র</a>` : ""}
        </div>
      `;

      const listenBtn = document.getElementById("listenBtn");
      if (listenBtn) {
        listenBtn.onclick = function () {
          toggleAudio([title, summary, content].filter(Boolean).join(". "));
        };
      }

      const shareBtn = document.getElementById("shareBtn");
      if (shareBtn) {
        shareBtn.onclick = function () {
          shareArticle(title, summary || "TruthOrRumor Bangla তে এই প্রতিবেদনটি পড়ুন।", articleUrl);
        };
      }
    }

    window.addEventListener("keydown", function (event) {
      if (event.key === "Escape") {
        closeAccessibilityModal();
      }
    });

    window.addEventListener("beforeunload", stopAudio);

    loadReaderPrefs();
    applyReaderPrefs();
    loadArticle();
  </script>
</body>
</html>
