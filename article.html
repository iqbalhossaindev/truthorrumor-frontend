  <script>
    const SUPABASE_URL = "https://bsnezcbmsbsememwqsjs.supabase.co";
    const SUPABASE_KEY = "sb_publishable_HTgjJsMcfGgIJaUSAzXTfw_yQ2dD_Uy";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const readerPrefs = {
      theme: "dark",
      fontSize: 18,
      lineHeight: 1.9,
      width: "860px"
    };

    let toastTimer = null;
    let currentUtterance = null;
    let listenButtonActive = false;

    function safeJsonParse(value, fallback) {
      try {
        return JSON.parse(value);
      } catch {
        return fallback;
      }
    }

    function escapeHtml(text) {
      return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    const SITE_NAME = "TruthOrRumor";
    const BASE_URL = "https://www.truthorrumor.com";
    const DEFAULT_IMAGE_URL = BASE_URL + "/logo.png";
    const DEFAULT_DESCRIPTION = "Read the latest fact check and verified report on TruthOrRumor.";
    const DEFAULT_AUTHOR = "TruthOrRumor Editorial Team";

    function normalizeText(value) {
      return String(value || "").replace(/\s+/g, " ").trim();
    }

    function makeMetaDescription(text, fallbackTitle) {
      const base = normalizeText(text || fallbackTitle || DEFAULT_DESCRIPTION) || DEFAULT_DESCRIPTION;
      return base.length > 160 ? base.slice(0, 157).trimEnd() + "..." : base;
    }

    function toAbsoluteUrl(value, fallback = DEFAULT_IMAGE_URL) {
      const raw = normalizeText(value);
      if (!raw) return fallback;
      try {
        return new URL(raw, BASE_URL).href;
      } catch {
        return fallback;
      }
    }

    function setMetaTag(attribute, key, content) {
      let element = document.querySelector(`meta[${attribute}="${key}"]`);
      if (!element) {
        element = document.createElement("meta");
        element.setAttribute(attribute, key);
        document.head.appendChild(element);
      }
      element.setAttribute("content", String(content || ""));
    }

    function setCanonical(url) {
      let element = document.querySelector('link[rel="canonical"]');
      if (!element) {
        element = document.createElement("link");
        element.setAttribute("rel", "canonical");
        document.head.appendChild(element);
      }
      element.setAttribute("href", url);
    }

    function setStructuredData(data) {
      let element = document.getElementById("articleStructuredData");
      if (!element) {
        element = document.createElement("script");
        element.id = "articleStructuredData";
        element.type = "application/ld+json";
        document.head.appendChild(element);
      }
      element.textContent = JSON.stringify(data, null, 2);
    }

    function buildArticleUrl(slugValue) {
      return BASE_URL + "/article/" + encodeURIComponent(String(slugValue || getSlugFromPath() || "").trim().toLowerCase());
    }

    function buildAuthorSchema(name) {
      const finalName = normalizeText(name) || DEFAULT_AUTHOR;
      return finalName === DEFAULT_AUTHOR
        ? { "@type": "Organization", name: SITE_NAME }
        : { "@type": "Person", name: finalName };
    }

    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("show"), 1800);
    }

    function loadReaderPrefs() {
      const saved = safeJsonParse(localStorage.getItem("tor_reader_prefs"), null);
      if (saved) {
        if (saved.theme) readerPrefs.theme = saved.theme;
        if (saved.fontSize) readerPrefs.fontSize = saved.fontSize;
        if (saved.lineHeight) readerPrefs.lineHeight = saved.lineHeight;
        if (saved.width) readerPrefs.width = saved.width;
      }
    }

    function saveReaderPrefs() {
      localStorage.setItem("tor_reader_prefs", JSON.stringify(readerPrefs));
    }

    function applyReaderPrefs() {
      document.body.dataset.theme = readerPrefs.theme;
      document.documentElement.style.setProperty("--reader-font-size", readerPrefs.fontSize + "px");
      document.documentElement.style.setProperty("--reader-line-height", String(readerPrefs.lineHeight));
      document.documentElement.style.setProperty("--reader-width", readerPrefs.width);
      updateAccessibilityButtons();
    }

    function updateAccessibilityButtons() {
      const ids = [
        "themeDarkBtn",
        "themeSepiaBtn",
        "themeSoftBtn",
        "widthNarrowBtn",
        "widthNormalBtn",
        "widthWideBtn"
      ];

      ids.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.classList.remove("active");
      });

      const themeMap = {
        dark: "themeDarkBtn",
        sepia: "themeSepiaBtn",
        "soft-light": "themeSoftBtn"
      };

      const themeBtn = document.getElementById(themeMap[readerPrefs.theme]);
      if (themeBtn) themeBtn.classList.add("active");

      const widthBtn =
        readerPrefs.width === "720px" ? "widthNarrowBtn" :
        readerPrefs.width === "980px" ? "widthWideBtn" :
        "widthNormalBtn";

      const widthEl = document.getElementById(widthBtn);
      if (widthEl) widthEl.classList.add("active");
    }

    function setTheme(theme) {
      readerPrefs.theme = theme;
      saveReaderPrefs();
      applyReaderPrefs();
    }

    function setReaderWidth(width) {
      readerPrefs.width = width;
      saveReaderPrefs();
      applyReaderPrefs();
    }

    function changeFontSize(delta) {
      readerPrefs.fontSize = Math.max(14, Math.min(26, readerPrefs.fontSize + delta));
      saveReaderPrefs();
      applyReaderPrefs();
    }

    function changeLineHeight(delta) {
      readerPrefs.lineHeight = Math.max(1.5, Math.min(2.4, +(readerPrefs.lineHeight + delta).toFixed(1)));
      saveReaderPrefs();
      applyReaderPrefs();
    }

    function resetReadingSettings() {
      readerPrefs.theme = "dark";
      readerPrefs.fontSize = 18;
      readerPrefs.lineHeight = 1.9;
      readerPrefs.width = "860px";
      saveReaderPrefs();
      applyReaderPrefs();
      showToast("Accessibility reset");
    }

    function openAccessibilityModal() {
      document.getElementById("accessibilityBackdrop").classList.add("show");
      updateAccessibilityButtons();
    }

    function closeAccessibilityModal(event) {
      if (event && event.target && event.target.id !== "accessibilityBackdrop") return;
      document.getElementById("accessibilityBackdrop").classList.remove("show");
    }

    function formatDate(value) {
      const date = value ? new Date(value) : new Date();
      if (Number.isNaN(date.getTime())) return "Unknown date";
      return new Intl.DateTimeFormat("en", {
        dateStyle: "medium",
        timeStyle: "short"
      }).format(date);
    }

    function getVerifiedIcon(color) {
      return `
        <svg viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 3l6 2.5v5c0 4.3-2.6 8.1-6 9.5-3.4-1.4-6-5.2-6-9.5v-5L12 3z"></path>
          <path d="M9.3 11.8l1.8 1.8 3.7-3.8"></path>
        </svg>
      `;
    }

    function renderStatusBadge(type) {
      const isTruth = String(type || "").toLowerCase() !== "rumor";
      return isTruth
        ? `<span class="status-badge truth">${getVerifiedIcon("#22c55e")} <span>Truth Verified</span></span>`
        : `<span class="status-badge rumor">${getVerifiedIcon("#ef4444")} <span>Rumor Verified</span></span>`;
    }

    function getSlugFromPath() {
      const parts = window.location.pathname.split("/").filter(Boolean);
      return decodeURIComponent(parts[parts.length - 1] || "").trim().toLowerCase();
    }

    function stopAudio() {
      if (currentUtterance) {
        window.speechSynthesis.cancel();
        currentUtterance = null;
      }
      const btn = document.getElementById("listenBtn");
      if (btn) btn.textContent = "Tap To Listen";
      listenButtonActive = false;
    }

    function toggleAudio(text) {
      if (!text || !text.trim()) return;

      if (listenButtonActive) {
        stopAudio();
        return;
      }

      stopAudio();

      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "en-US";
      currentUtterance = utterance;
      listenButtonActive = true;

      const btn = document.getElementById("listenBtn");
      if (btn) btn.textContent = "Tap To Stop Listening";

      utterance.onend = stopAudio;
      utterance.onerror = stopAudio;

      try {
        window.speechSynthesis.speak(utterance);
      } catch {
        stopAudio();
      }
    }

    async function loadArticle() {
      const slug = getSlugFromPath();
      const root = document.getElementById("articleRoot");

      if (!slug) {
        setMetaTag("name", "robots", "noindex,follow");
        root.innerHTML = `<div class="state">Article slug not found.</div>`;
        return;
      }

      let article = null;

      const exactResult = await supabaseClient
        .from("posts")
        .select("*")
        .eq("slug", slug)
        .eq("published", true)
        .limit(1);

      if (Array.isArray(exactResult.data) && exactResult.data.length > 0) {
        article = exactResult.data[0];
      }

      if (!article) {
        const fallbackResult = await supabaseClient
          .from("posts")
          .select("*")
          .ilike("slug", slug)
          .eq("published", true)
          .limit(1);

        if (Array.isArray(fallbackResult.data) && fallbackResult.data.length > 0) {
          article = fallbackResult.data[0];
        }
      }

      if (!article) {
        setMetaTag("name", "robots", "noindex,follow");
        root.innerHTML = `<div class="state">Article not found.<br><br>Slug: ${escapeHtml(slug)}</div>`;
        return;
      }

      const title = normalizeText(article.title) || "TruthOrRumor Article";
      const summary = normalizeText(article.excerpt || article.summary || "");
      const content = article.content || "";
      const imageUrl = article.image_url || "";
      const country = normalizeText(article.country) || "World";
      const category = normalizeText(article.category) || "World News";
      const verdict = article.verdict || "truth";
      const sourceUrl = article.source_url || "";
      const publishedAt = article.created_at || "";
      const updatedAt = article.updated_at || article.created_at || "";
      const authorName = normalizeText(article.author || article.author_name || article.authorName || "") || DEFAULT_AUTHOR;
      const articleSlug = normalizeText(article.slug || slug).toLowerCase();
      const articleUrl = buildArticleUrl(articleSlug);
      const metaDescription = makeMetaDescription(summary, title);
      const shareImage = toAbsoluteUrl(imageUrl, DEFAULT_IMAGE_URL);
      const publishedIso = publishedAt ? new Date(publishedAt).toISOString() : "";
      const updatedIso = updatedAt ? new Date(updatedAt).toISOString() : (publishedIso || "");

      document.title = title + " | " + SITE_NAME;
      setMetaTag("name", "description", metaDescription);
      setMetaTag("name", "robots", "index,follow,max-image-preview:large");
      setMetaTag("name", "author", authorName);
      setMetaTag("property", "og:type", "article");
      setMetaTag("property", "og:site_name", SITE_NAME);
      setMetaTag("property", "og:title", title);
      setMetaTag("property", "og:description", metaDescription);
      setMetaTag("property", "og:image", shareImage);
      setMetaTag("property", "og:image:alt", title);
      setMetaTag("property", "og:url", articleUrl);
      setMetaTag("property", "og:locale", "en_US");
      if (publishedIso) setMetaTag("property", "article:published_time", publishedIso);
      if (updatedIso) setMetaTag("property", "article:modified_time", updatedIso);
      setMetaTag("property", "article:section", category);
      setMetaTag("name", "twitter:card", "summary_large_image");
      setMetaTag("name", "twitter:title", title);
      setMetaTag("name", "twitter:description", metaDescription);
      setMetaTag("name", "twitter:image", shareImage);
      setCanonical(articleUrl);
      setStructuredData({
        "@context": "https://schema.org",
        "@type": "NewsArticle",
        mainEntityOfPage: {
          "@type": "WebPage",
          "@id": articleUrl
        },
        headline: title,
        description: metaDescription,
        image: [shareImage],
        datePublished: publishedIso || undefined,
        dateModified: updatedIso || undefined,
        author: [buildAuthorSchema(authorName)],
        publisher: {
          "@type": "Organization",
          name: SITE_NAME,
          logo: {
            "@type": "ImageObject",
            url: DEFAULT_IMAGE_URL
          }
        },
        articleSection: category,
        inLanguage: "en",
        isAccessibleForFree: true,
        url: articleUrl
      });

      root.innerHTML = `
        ${renderStatusBadge(String(verdict).toLowerCase() === "rumor" ? "rumor" : "real")}
        <h1>${escapeHtml(title)}</h1>
        <div class="meta">
          ${escapeHtml(country)} • ${escapeHtml(category)} • Published ${formatDate(publishedAt)} • Updated ${formatDate(updatedAt)}
        </div>
        ${summary ? `<div class="summary"><strong>Quick Summary:</strong> ${escapeHtml(summary)}</div>` : ""}
        ${imageUrl ? `<img class="hero-image" src="${escapeHtml(imageUrl)}" alt="${escapeHtml(title)}" onerror="this.style.display='none'">` : ""}
        <div class="content">${escapeHtml(content)}</div>
        <div class="actions">
          <a class="action-btn primary" href="/">Home</a>
          <button id="listenBtn" class="action-btn" onclick=${JSON.stringify("")}>Tap To Listen</button>
          ${sourceUrl ? `<a class="action-btn" href="${escapeHtml(sourceUrl)}" target="_blank" rel="noopener noreferrer">Source</a>` : ""}
        </div>
      `;

      const listenBtn = document.getElementById("listenBtn");
      if (listenBtn) {
        listenBtn.onclick = function () {
          toggleAudio([title, summary, content].filter(Boolean).join(". "));
        };
      }
    }

    window.addEventListener("keydown", function (event) {
      if (event.key === "Escape") {
        closeAccessibilityModal();
      }
    });

    window.addEventListener("beforeunload", stopAudio);

    loadReaderPrefs();
    applyReaderPrefs();
    loadArticle();
  </script>
</body>
</html>
